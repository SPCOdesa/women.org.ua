<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>CMS</title>
  <!-- Prevent Decap CMS from auto-initializing before the DOM/config is ready -->
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>

<body>
  <script>
    function initCMS() {
      try {
        if (window.CMS && typeof CMS.init === 'function') {
          CMS.init();
        }
      } catch (e) {
        console.error('CMS.init() failed, will retry on window.load', e);
      }
    }

    if (window.CMS && typeof CMS.init === 'function') {
      initCMS();
    } else {
      window.addEventListener('load', initCMS);
    }
  </script>
</body>

</html>
